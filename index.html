<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioFlow - Find a flow and go with it</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="navbar">
        
        <div class="nav-left">
            <div class="logo">AudioFlow</div>
        </div>        
                    
        <div class="nav-center">
            <button>Home</button>
            <input type="text" placeholder="Search">
        </div>
        
        <div class="nav-right">
            <button>Premium</button>
            <button>Support</button>
            <button>Download</button>
            
            <span class="divider"></span>

            <button>Sign up</button>
            <button class="loginButton">Login</button>
        </div>

    </header>

    <div class="content">

        <div id="leftPanel">

            <header>
                <h3>Your Library</h3>
                <button id="create">Create</button>
            </header>

            <div id="playlistArea">
                
            </div>

            <footer>

                <div class="footerLinks">
                <a href="">Legal</a>
                <a href="">Safety & Privacy center</a>
                <a href="">Privacy Policy</a>
                <a href="">Cookies</a>
                <a href="">Accessibility</a>
                </div>
                
                <button id="languageSelection">Language</button>
            
            </footer>
        </div>
    

        <div id="main">

            <h2 id="trendingSongs">Trending Songs</h2>
            <!-- <br> -->

            <div class="row">

                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>

            </div>

    

            <h2 id="popularArtists">Popular Artists</h2>
            
            <div class="row">

                <div class="artistCard"></div>
                <div class="artistCard"></div>
                <div class="artistCard"></div>
                <div class="artistCard"></div>
                <div class="artistCard"></div>
                <div class="artistCard"></div>
                <div class="artistCard"></div>
                <div class="artistCard"></div>
                <div class="artistCard"></div>
                <div class="artistCard"></div>

            </div>

            <h2 id="popularAlbums">Popular Albums and Singles</h2>

            <div class="row">

                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>
                <div class="songCard"></div>

            </div>

            
        
        </div>

    </div>




</body>
</html>
